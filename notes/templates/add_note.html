{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Note</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>Create a New Note</h1>
            <a href="{% url 'notes_list' %}" class="back-link">← Back to Notes</a>
        </div>

        <form method="POST" class="note-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="title">Note Title</label>
                <input type="text" id="title" name="title" placeholder="Enter note title" required>
            </div>

            <div class="form-group">
                <label for="content">Note Content</label>
                <textarea id="content" name="content" placeholder="Write your note here..." rows="10"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Note</button>
                <a href="{% url 'notes_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
